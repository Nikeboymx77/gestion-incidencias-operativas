
services:
  mysql:
    image: mysql:8.0
    container_name: incidencias_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: incidencias_db
      MYSQL_USER: incidencias_user
      MYSQL_PASSWORD: incidencias_pass
    ports:
      - "3306:3306"
    volumes:
      - incidencias_mysql_data:/var/lib/mysql

volumes:
  incidencias_mysql_data: